# Open PRs — a count of PRs waiting on you. Deliberately has NO bundled puller:
# "which PRs" is service/work-specific, so the puller lives OUTSIDE this repo and
# pull.conf points PRS_PULL_CMD at it (see README.md "Open PRs" + this dir's
# README.md). throttle_min backs off the upstream `prs` rate limit. See README.
id=prs
title=Open PRs
flag=PRS_PULL_ENABLED
pull_cmd_var=PRS_PULL_CMD
order=20
timeout=45
throttle_min=7
