# Provider manifest template. Copy this whole directory to
#   ~/.config/tmuxopticon/providers.d/<your-provider>/
# rename the keys, then add `<FLAG>=true` to ~/.config/tmuxopticon/pull.conf.
# No core files change — the registry (lib/providers.sh) discovers it.
#
# Keys: id (required, -> tmp/<id>.cache) · title · flag (required, the pull.conf
# gate) · pull (script, run as `pull <cachefile>`) · pull_cmd_var (name of a
# pull.conf var holding an external puller path, used instead of `pull`) ·
# order (low=top, default 50) · timeout (secs, default 45) · throttle_min
# (minutes between pulls, default 0 = every minute).
id=example
title=Example
flag=EXAMPLE_PULL_ENABLED
pull=pull.sh
order=40
timeout=15
throttle_min=0
